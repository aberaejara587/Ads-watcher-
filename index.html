<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Feet Ad Section - Monetag</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src='//libtl.com/sdk.js' data-zone='10850188' data-sdk='show_10850188'></script>

    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-sub: #888888;
            --accent: #FF9800; /* Monetag Color Theme */
            --shadow: rgba(0, 0, 0, 0.05);
            --btn-green: #2ecc71;
        }

        body.tg-dark {
            --bg-color: #18222d;
            --card-bg: #212d3b;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ad-wrapper {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px var(--shadow);
            border: 1px solid rgba(128, 128, 128, 0.1);
            text-align: center;
            margin-bottom: 20px;
        }

        .ad-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--text-sub);
        }

        .ad-label span {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        .ad-badge {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 5px;
        }

        .btn-container {
            display: grid;
            gap: 10px;
            width: 100%;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .reward-btn {
            background-color: var(--btn-green);
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="ad-wrapper">
        <div class="ad-label">
            <span>Magic Feet Football</span>
            <span class="ad-badge">EARN COIN</span>
        </div>

        <div class="btn-container">
            <button class="reward-btn" onclick="showRewarded()">📺 Beeksisni Ilaali (Reward)</button>
            
            <button onclick="showInterstitial()">✨ Beeksisni Gabaabaa</button>
        </div>

        <p class="loading-text" id="status-text">Beeksisni qophaa'aa jira...</p>
    </div>

    <div id="monetag-banner-container"></div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        if (tele.colorScheme === 'dark') {
            document.body.classList.add('tg-dark');
        }

        // 1. Rewarded Ad Function
        function showRewarded() {
            document.getElementById('status-text').innerText = "Beeksisni fe'amaa jira...";
            
            show_10850188('pop').then(() => {
                // Beeksisni yoo dhumate reward asitti kenni
                document.getElementById('status-text').innerText = "Baay'ee gaari! Badhaasa kee fudhadhu.";
                alert("Gammadi! Badhaasa kee fudhatteetta.");
                
                // Fakkeenyaaf: updateCoins(10);
            }).catch(e => {
                document.getElementById('status-text').innerText = "Dogoggorri uumameera.";
                console.error("Ad error:", e);
            });
        }

        // 2. Interstitial Ad Function
        function showInterstitial() {
            show_10850188().then(() => {
                console.log("Interstitial closed");
            });
        }

        // 3. In-App Interstitial (Otomatiikaan kan dhufu)
        // Kun akkuma App-ichi banameen ofiin ni dhufa
        show_10850188({
            type: 'inApp',
            inAppSettings: {
                frequency: 2,
                capping: 0.1,
                interval: 30,
                timeout: 5,
                everyPage: false
            }
        });

    </script>
</body>
</html>
