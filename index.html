<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Feet Football - Ads</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    
    <style>
        :root {
            --primary: #0088cc;
            --primary-dark: #006699;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --text-sub: #636e72;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body.tg-dark {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-sub: #94a3b8;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .ad-container {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .ad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 800;
            background: linear-gradient(to right, #0088cc, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .ad-badge {
            font-size: 10px;
            background: rgba(0, 136, 204, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 50px;
            font-weight: 700;
        }

        #richads-display {
            min-height: 250px;
            background: rgba(0,0,0,0.02);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px dashed var(--text-sub);
        }

        .loader {
            color: var(--text-sub);
            font-size: 13px;
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .btn-show {
            margin-top: 15px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="ad-container">
        <div class="ad-header">
            <div class="brand-name">Magic Feet</div>
            <div class="ad-badge">SPONSORED</div>
        </div>

        <div id="richads-display">
            <div class="loader" id="status-text">Beeksisa fiduuf jira...</div>
        </div>
        
        <button class="btn-show" onclick="showAd()">Beeksisa Ilaali</button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        if (tele.colorScheme === 'dark') {
            document.body.classList.add('tg-dark');
        }

        // --- ADS LOGIC ---
        function initAds() {
            try {
                // RichAds Controller Init
                window.tgObj = new TelegramAdsController();
                tgObj.initialize({
                    pubId: "1004916", // ID kee kan sirrii ta'u mirkaneeffadhu
                    appId: "6897",
                    onLoad: () => {
                        document.getElementById('status-text').innerHTML = "Beeksisi qophaayeera!";
                        showAd(); // Akkuma qophaayeen akka arguuf
                    },
                    onFailed: (err) => {
                        console.error("Ads failed", err);
                        document.getElementById('status-text').innerHTML = "Beeksisa fiduun hin danda'amne.";
                    }
                });
            } catch (e) {
                console.error("SDK Error:", e);
            }
        }

        function showAd() {
            if (window.tgObj) {
                window.tgObj.show();
            } else {
                alert("SDK qophaa'aa miti!");
            }
        }

        // Jalqabarratti waami
        window.onload = initAds;
    </script>
</body>
</html>
