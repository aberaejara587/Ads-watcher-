<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Feet Tasks</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src='//libtl.com/sdk.js' data-zone='10850188' data-sdk='show_10850188'></script>

    <style>
        body {
            background-color: #000000; /* Dark background like the screenshot */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 28px;
            margin: 0;
        }

        .header p {
            color: #888;
            font-size: 14px;
            margin: 5px 0;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0 10px 0;
        }

        /* Task Row Style */
        .task-card {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            background-color: #1a1a1a; /* Dark gray for rows */
            transition: background 0.3s;
        }

        /* Orange highlight for the first task like screenshot */
        .task-card.highlight {
            background-color: #f39c12; 
            color: #000;
        }

        .task-icon {
            font-size: 35px;
            margin-right: 15px;
        }

        .task-info {
            flex-grow: 1;
        }

        .task-info h4 {
            margin: 0;
            font-size: 16px;
        }

        .task-info p {
            margin: 2px 0 0 0;
            font-size: 12px;
            opacity: 0.8;
        }

        .claim-btn {
            background-color: #ffffff;
            color: #000;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .claim-btn:active {
            transform: scale(0.95);
        }

        .timer-icon {
            font-size: 24px;
            color: #888;
        }

        /* Bottom Nav Dummy */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #000;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tasks</h1>
        <p>Get rewards for actions</p>
    </div>

    <div class="task-card highlight">
        <div class="task-icon">🤩</div>
        <div class="task-info">
            <h4>Watch short ads</h4>
            <p>Rewarded Interstitial</p>
        </div>
        <button class="claim-btn" onclick="runRewarded()">Claim</button>
    </div>

    <div class="task-card">
        <div class="task-icon">😎</div>
        <div class="task-info">
            <h4>Click to get reward</h4>
            <p>Rewarded Popup</p>
        </div>
        <button class="claim-btn" onclick="runPopup()">Claim</button>
    </div>

    <div class="section-title">Daily</div>
    <p style="color: #666; font-size: 13px; margin-top: -5px;">After time actions</p>

    <div class="task-card">
        <div class="task-icon">👀</div>
        <div class="task-info">
            <h4>Watch video</h4>
            <p>In-App Interstitial</p>
        </div>
        <div class="timer-icon">🕒</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // 1. Rewarded Interstitial
        function runRewarded() {
            show_10850188().then(() => {
                alert('Qabxii 10 argatteetta! (Reward Claimed)');
                // Asitti koodii database kee update gochuuf fayyadami
            }).catch(e => {
                console.error("Ad error", e);
            });
        }

        // 2. Rewarded Popup
        function runPopup() {
            show_10850188('pop').then(() => {
                alert('Badhaasa Popup fudhatteetta!');
            }).catch(e => {
                console.error("Popup error", e);
            });
        }

        // 3. In-App Interstitial (Automatic background loading)
        show_10850188({
            type: 'inApp',
            inAppSettings: {
                frequency: 2,
                capping: 0.1,
                interval: 30,
                timeout: 5,
                everyPage: false
            }
        });
    </script>
</body>
</html>
