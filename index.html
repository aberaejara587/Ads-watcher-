<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Feet Ad Section</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "1004916",
            appId: "6897",
        });
    </script>

    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-sub: #888888;
            --accent: #0088cc;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        body.tg-dark {
            --bg-color: #18222d;
            --card-bg: #212d3b;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .ad-wrapper {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 25px var(--shadow);
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .ad-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--text-sub);
        }

        .ad-label span {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        .ad-badge {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 5px;
        }

        #richads-container {
            min-height: 100px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-sub);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="ad-wrapper">
        <div class="ad-label">
            <span>Magic Feet Football</span>
            <span class="ad-badge">AD</span>
        </div>

        <div id="richads-container">
            <span class="loading-text">Beeksisni fe'amaa jira...</span>
        </div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand(); 
        
        if (tele.colorScheme === 'dark') {
            document.body.classList.add('tg-dark');
        }
    </script>
</body>
</html>
