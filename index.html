<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Feet Football - Ads</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    
    <style>
        :root {
            --primary: #0088cc;
            --primary-dark: #006699;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --text-sub: #636e72;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Dark Mode Settings */
        body.tg-dark {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-sub: #94a3b8;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .ad-container {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .ad-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 800;
            background: linear-gradient(to right, #0088cc, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .ad-badge {
            font-size: 10px;
            background: rgba(0, 136, 204, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 50px;
            font-weight: 700;
            border: 1px solid rgba(0, 136, 204, 0.2);
        }

        #richads-display {
            min-height: 200px;
            background: rgba(0,0,0,0.02);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px dashed var(--text-sub);
        }

        .loader {
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 500;
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="ad-container">
        <div class="ad-header">
            <div class="brand-name">Magic Feet</div>
            <div class="ad-badge">SPONSORED</div>
        </div>

        <div id="richads-display">
            <div class="loader">Loading Magic...</div>
        </div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        // Dark mode setup
        if (tele.colorScheme === 'dark') {
            document.body.classList.add('tg-dark');
        }

        // --- ADS LOGIC (RAKKOO KEE KANAAN SIRREESSI) ---
        try {
            window.TelegramAdsController = new TelegramAdsController();
            window.TelegramAdsController.initialize({
                pubId: "1004916",
                appId: "6897",
            });

            // Beeksisa akka mul'atu ajajuu (Show Ad)
            // RichAds 'Rewarded' ykn 'Interstitial' yoo ta'e kanaan waama:
            window.TelegramAdsController.show(); 

        } catch (e) {
            console.error("Ads failed to load", e);
            document.getElementById('richads-display').innerHTML = "Check connection...";
        }
    </script>
</body>
</html>
